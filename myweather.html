<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:#fff;
            width:350px;
            padding:25px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:70%;
            padding:10px;
            border:2px solid #ddd;
            border-radius:8px;
            outline:none;
        }

        button{
            padding:10px 15px;
            border:none;
            background:#007bff;
            color:#fff;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        .weather-box{
            margin-top:20px;
        }

        .temp{
            font-size:40px;
            font-weight:bold;
            color:#333;
        }

        .city{
            font-size:24px;
            color:#555;
        }

        .details{
            margin-top:10px;
            font-size:18px;
            color:#666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Weather App</h1>

        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Search</button>

        <div class="weather-box" id="weatherResult">
            <p>Enter a city name</p>
        </div>
    </div>

    <script>
    const apiKey = "1802c47e9bb45dae1ff7d2cec52d4c70";

    async function getWeather() {
        const city = document.getElementById("city").value.trim();
        const weatherResult = document.getElementById("weatherResult");

        if (!city) {
            alert("Please enter a city name");
            return;
        }

        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            console.log(data); // helps debug

            if (data.cod != 200) {
                weatherResult.innerHTML = `<p>City not found or API issue</p>`;
                return;
            }

            weatherResult.innerHTML = `
                <p class="city">${data.name}</p>
                <p class="temp">${data.main.temp}°C</p>
                <div class="details">
                    <p>Weather: ${data.weather[0].description}</p>
                    <p>Humidity: ${data.main.humidity}%</p>
                    <p>Wind Speed: ${data.wind.speed} m/s</p>
                </div>
            `;

        } catch (error) {
            console.log("Error:", error);
            weatherResult.innerHTML = `<p>Something went wrong</p>`;
        }
    }
    </script>

</body>
</html>
